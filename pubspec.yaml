name: gigscourt
description: "Your Service, Your Court - Local Service Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.3.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  image_picker: ^1.2.2
  flutter_map: ^8.3.0
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  supabase_flutter: ^2.14.2
  latlong2: ^0.9.1
  http: ^1.6.0
  cloud_functions: ^6.3.2
  url_launcher: ^6.3.2
  firebase_remote_config: ^6.5.2
  webview_flutter: ^4.14.0
  record: ^7.1.0
  audioplayers: ^6.7.1
  supercluster: ^3.2.0
  flutter_advanced_chat_ui: ^1.0.0
  keyboard_dismisser: ^3.0.0
  google_maps_flutter: ^2.17.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700